<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
--primary: #6366f1;
--secondary: #ec4899;
--bg: #f8fafc;
--bg-card: rgba(255,255,255,0.9);
--text: #1e293b;
--text-muted: #64748b;
--border: #e2e8f0;
}
[data-theme="dark"] {
--bg: #0f172a;
--bg-card: rgba(30,41,59,0.9);
--text: #f1f5f9;
--text-muted: #94a3b8;
--border: #334155;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Inter', sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
transition: all 0.3s;
}
.theme-toggle {
position: fixed;
top: 20px; right: 20px;
z-index: 1000;
background: var(--bg-card);
border: 1px solid var(--border);
width: 50px; height: 50px;
border-radius: 50%;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.5rem;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
transition: transform 0.3s;
}
.theme-toggle:hover { transform: scale(1.1); }
.hero {
background: linear-gradient(135deg, var(--primary), var(--secondary));
padding: 80px 20px 120px;
text-align: center;
position: relative;
}
.hero::after {
content: '';
position: absolute;
bottom: -2px; left: 0;
width: 100%; height: 60px;
background: var(--bg);
clip-path: ellipse(55% 100% at 50% 100%);
}
.hero h1 {
font-size: clamp(2rem, 5vw, 3rem);
color: white;
margin-bottom: 10px;
}
.hero p { color: rgba(255,255,255,0.9); font-size: 1.1rem; }
.hero-stats {
display: flex;
justify-content: center;
gap: 50px;
margin-top: 30px;
}
.stat-number { font-size: 2.5rem; font-weight: 800; color: white; }
.stat-label { color: rgba(255,255,255,0.8); font-size: 0.85rem; text-transform: uppercase; }
.container {
max-width: 1200px;
margin: -50px auto 40px;
padding: 0 20px;
position: relative;
z-index: 10;
}
.search-section {
background: var(--bg-card);
backdrop-filter: blur(10px);
border: 1px solid var(--border);
padding: 25px;
border-radius: 20px;
margin-bottom: 30px;
box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
.search-bar {
width: 100%;
padding: 15px 20px;
border: 2px solid var(--border);
border-radius: 12px;
font-size: 1rem;
background: var(--bg);
color: var(--text);
outline: none;
transition: border-color 0.3s;
}
.search-bar:focus { border-color: var(--primary); }
.filter-tags {
display: flex;
flex-wrap: wrap;
gap: 10px;
margin-top: 15px;
}
.filter-tag {
padding: 8px 16px;
background: var(--bg);
border: 2px solid var(--border);
border-radius: 25px;
cursor: pointer;
font-size: 0.9rem;
font-weight: 500;
transition: all 0.3s;
}
.filter-tag:hover { border-color: var(--primary); color: var(--primary); }
.filter-tag.active {
background: linear-gradient(135deg, var(--primary), var(--secondary));
color: white;
border-color: transparent;
}
.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
gap: 25px;
}
.card {
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 25px;
transition: all 0.3s;
display: flex;
flex-direction: column;
}
.card:hover {
transform: translateY(-5px);
box-shadow: 0 20px 40px rgba(0,0,0,0.15);
border-color: var(--primary);
}
.card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
.tag {
background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(236,72,153,0.1));
color: var(--primary);
padding: 6px 14px;
border-radius: 20px;
font-size: 0.75rem;
font-weight: 700;
text-transform: uppercase;
}
.new-badge {
background: linear-gradient(135deg, #10b981, #059669);
color: white;
padding: 5px 10px;
border-radius: 15px;
font-size: 0.7rem;
font-weight: 700;
}
.title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
.description { color: var(--text-muted); font-size: 0.9rem; flex-grow: 1; margin-bottom: 15px; }
.meta { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 15px; }
.btn-group {
display: flex;
gap: 10px;
}
.download-btn, .view-btn {
flex: 1;
padding: 14px;
border-radius: 12px;
text-decoration: none;
text-align: center;
font-weight: 700;
transition: all 0.3s;
cursor: pointer;
border: none;
font-size: 0.95rem;
}
.download-btn {
background: linear-gradient(135deg, var(--primary), var(--secondary));
color: white;
}
.download-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(99,102,241,0.4); }
.view-btn {
background: var(--bg);
color: var(--primary);
border: 2px solid var(--primary);
}
.view-btn:hover {
background: var(--primary);
color: white;
}
.empty-state { text-align: center; padding: 60px; grid-column: 1/-1; }
.empty-state-icon { font-size: 4rem; margin-bottom: 15px; }
.footer {
text-align: center;
padding: 40px;
color: var(--text-muted);
border-top: 1px solid var(--border);
margin-top: 60px;
}
.footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
.footer a:hover { color: var(--secondary); }
.loading { text-align: center; padding: 60px; grid-column: 1/-1; }
.spinner {
width: 40px; height: 40px;
border: 4px solid var(--border);
border-top-color: var(--primary);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 15px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* PDF Viewer Modal */
.pdf-modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.95);
z-index: 2000;
animation: fadeIn 0.3s;
}
.pdf-modal.show {
display: flex;
flex-direction: column;
}
@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}
.pdf-header {
background: var(--bg-card);
padding: 15px 20px;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 1px solid var(--border);
}
.pdf-title {
font-size: 1.2rem;
font-weight: 700;
color: var(--text);
}
.pdf-controls {
display: flex;
gap: 10px;
align-items: center;
}
.pdf-btn {
background: var(--primary);
color: white;
border: none;
padding: 10px 20px;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
transition: all 0.3s;
font-size: 0.9rem;
}
.pdf-btn:hover {
opacity: 0.9;
transform: translateY(-2px);
}
.pdf-btn.close {
background: var(--danger, #ef4444);
}
.pdf-content {
flex: 1;
overflow: auto;
display: flex;
justify-content: center;
align-items: flex-start;
padding: 20px;
}
.pdf-iframe {
width: 100%;
max-width: 900px;
height: 100%;
border: none;
background: white;
border-radius: 8px;
box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
.pdf-loading {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
color: white;
font-size: 1.2rem;
}
.pdf-spinner {
width: 50px;
height: 50px;
border: 5px solid rgba(255,255,255,0.3);
border-top-color: white;
border-radius: 50%;
animation: spin 1s linear infinite;
margin-bottom: 20px;
}
@media (max-width: 768px) {
.hero-stats { gap: 30px; }
.stat-number { font-size: 2rem; }
.grid { grid-template-columns: 1fr; }
.btn-group { flex-direction: column; }
.pdf-header {
flex-direction: column;
gap: 10px;
}
.pdf-controls {
width: 100%;
justify-content: space-between;
}
.pdf-content {
padding: 10px;
}
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
<span id="theme-icon">🌙</span>
</button>
<div class="hero">
<h1 id="site-name">📚 Study Portal</h1>
<p id="site-tagline">Your gateway to academic excellence!</p>
<div class="hero-stats">
<div>
<div class="stat-number" id="total-papers">0</div>
<div class="stat-label">Papers</div>
</div>
<div>
<div class="stat-number" id="total-subjects">0</div>
<div class="stat-label">Subjects</div>
</div>
</div>
</div>
<div class="container">
<div class="search-section">
<input type="text" id="search" class="search-bar" placeholder="🔍 Search papers..." onkeyup="filterPapers()">
<div class="filter-tags" id="filter-tags">
<span class="filter-tag active" onclick="filterBySubject('all', this)">📌 All</span>
</div>
</div>
<div class="grid" id="paper-grid">
<div class="loading">
<div class="spinner"></div>
<p>Loading papers...</p>
</div>
</div>
</div>
<div class="footer">
<p id="footer-text">Made with ❤️ for Students</p>
<p style="margin-top: 15px;"><a href="admin.html">🔐 Admin Portal</a></p>
</div>

<!-- PDF Viewer Modal -->
<div class="pdf-modal" id="pdf-modal">
<div class="pdf-header">
<div class="pdf-title" id="pdf-modal-title">Loading PDF...</div>
<div class="pdf-controls">
<button class="pdf-btn" onclick="downloadCurrentPDF()">⬇️ Download</button>
<button class="pdf-btn close" onclick="closePDFModal()">✖️ Close</button>
</div>
</div>
<div class="pdf-content" id="pdf-content">
<div class="pdf-loading">
<div class="pdf-spinner"></div>
<p>Loading PDF...</p>
</div>
</div>
</div>

<script>
let allPapers = [];
let siteConfig = {};
let currentFilter = 'all';
let currentPDF = null;

function initTheme() {
const saved = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', saved);
document.getElementById('theme-icon').textContent = saved === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
const current = document.documentElement.getAttribute('data-theme');
const next = current === 'dark' ? 'light' : 'dark';
document.documentElement.setAttribute('data-theme', next);
localStorage.setItem('theme', next);
document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
}

async function loadConfig() {
try {
const res = await fetch('config.json?t=' + Date.now());
siteConfig = await res.json();
if (siteConfig.siteName) document.getElementById('site-name').textContent = '📚 ' + siteConfig.siteName;
if (siteConfig.siteTagline) document.getElementById('site-tagline').textContent = siteConfig.siteTagline;
if (siteConfig.footerText) document.getElementById('footer-text').textContent = siteConfig.footerText;
if (siteConfig.primaryColor) document.documentElement.style.setProperty('--primary', siteConfig.primaryColor);
if (siteConfig.secondaryColor) document.documentElement.style.setProperty('--secondary', siteConfig.secondaryColor);
} catch (e) { console.log('Using defaults'); }
}

async function loadPapers() {
try {
const res = await fetch('papers.json?t=' + Date.now());
allPapers = await res.json();
updateStats();
buildFilterTags();
renderPapers(allPapers);
} catch (e) {
document.getElementById('paper-grid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><h3>Coming Soon!</h3><p>Papers are being uploaded.</p></div>';
}
}

function updateStats() {
const visible = allPapers.filter(p => p.visible !== false);
document.getElementById('total-papers').textContent = visible.length;
document.getElementById('total-subjects').textContent = [...new Set(visible.map(p => p.subject))].length;
}

function buildFilterTags() {
const subjects = [...new Set(allPapers.filter(p => p.visible !== false).map(p => p.subject))].sort();
const container = document.getElementById('filter-tags');
container.innerHTML = '<span class="filter-tag active" onclick="filterBySubject(\'all\', this)">📌 All</span>';
subjects.forEach(s => {
container.innerHTML += '<span class="filter-tag" onclick="filterBySubject(\'' + s + '\', this)">' + s + '</span>';
});
}

function filterBySubject(subject, el) {
currentFilter = subject;
document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
el.classList.add('active');
filterPapers();
}

function filterPapers() {
const query = document.getElementById('search').value.toLowerCase();
let filtered = allPapers.filter(p => p.visible !== false);
if (currentFilter !== 'all') filtered = filtered.filter(p => p.subject === currentFilter);
if (query) filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || (p.subject && p.subject.toLowerCase().includes(query)));
renderPapers(filtered);
}

function renderPapers(papers) {
const grid = document.getElementById('paper-grid');
if (papers.length === 0) {
grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>No Papers Found</h3></div>';
return;
}
grid.innerHTML = papers.map(p => {
const date = new Date(p.id).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
const isNew = Date.now() - p.id < 3 * 24 * 60 * 60 * 1000;
return `<div class="card">
<div class="card-header">
<span class="tag">${p.subject || 'General'}</span>
${isNew ? '<span class="new-badge">✨ NEW</span>' : ''}
</div>
<div class="title">${p.name}</div>
<div class="description">${p.description || 'Download this paper for your preparation!'}</div>
<div class="meta">📅 ${date}</div>
<div class="btn-group">
<button class="view-btn" onclick="viewPDF('${p.link}', '${p.name.replace(/'/g, "\\'")}')">👁️ View</button>
<a href="${p.link}" class="download-btn" download>⬇️ Download</a>
</div>
</div>`;
}).join('');
}

function viewPDF(link, name) {
currentPDF = link;
const modal = document.getElementById('pdf-modal');
const content = document.getElementById('pdf-content');
const title = document.getElementById('pdf-modal-title');

title.textContent = name;
modal.classList.add('show');
document.body.style.overflow = 'hidden';

// Show loading
content.innerHTML = '<div class="pdf-loading"><div class="pdf-spinner"></div><p>Loading PDF...</p></div>';

// Load PDF with Google Docs Viewer for better compatibility
setTimeout(() => {
// Try direct embed first, fallback to Google Docs viewer
const isPDFDirect = link.endsWith('.pdf');
let iframeHTML;

if (link.includes('github')) {
// For GitHub hosted PDFs, use Google Docs Viewer
const encodedURL = encodeURIComponent(link);
iframeHTML = `<iframe class="pdf-iframe" src="https://docs.google.com/viewer?url=${encodedURL}&embedded=true" allowfullscreen></iframe>`;
} else {
// For other PDFs, try direct embed
iframeHTML = `<iframe class="pdf-iframe" src="${link}" allowfullscreen></iframe>`;
}
content.innerHTML = iframeHTML;
}, 500);
}

function closePDFModal() {
const modal = document.getElementById('pdf-modal');
modal.classList.remove('show');
document.body.style.overflow = 'auto';
currentPDF = null;
}

function downloadCurrentPDF() {
if (currentPDF) {
const link = document.createElement('a');
link.href = currentPDF;
link.download = '';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}
}

// Close modal with ESC key
document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') {
closePDFModal();
}
});

// Close modal when clicking outside
document.getElementById('pdf-modal').addEventListener('click', (e) => {
if (e.target.id === 'pdf-modal') {
closePDFModal();
}
});

initTheme();
loadConfig();
loadPapers();
</script>
</body>
</html>
