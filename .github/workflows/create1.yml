name: 🔄 RESET & Rebuild Riyaaz Sir LMS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🗑️ Delete All Existing Files
        run: |
          # Remove everything except .git folder
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          echo "✅ All files deleted!"
      - name: 📄 Create papers.json
        run: |
          echo '[]' > papers.json
      - name: 📄 Create config.json
        run: |
          cat > config.json << 'EOF'
          {
            "adminUsername": "riyaazsir",
            "adminPassword": "admin123",
            "siteName": "Riyaaz Sir's Portal",
            "siteTagline": "Your gateway to academic excellence!",
            "githubUsername": "rajaprogrammer",
            "repoName": "sample-papers",
            "footerText": "Made with ❤️ for Riyaaz Sir's Students",
            "primaryColor": "#6366f1",
            "secondaryColor": "#ec4899"
          }
          EOF
      - name: 📁 Create papers folder
        run: |
          mkdir -p papers
          echo "PDF storage folder" > papers/.gitkeep
      - name: 📄 Create README.md
        run: |
          cat > README.md << 'EOF'
          # 📚 Riyaaz Sir's Premium Learning Portal
          ## 🔐 Default Login
          - **Username:** `riyaazsir`
          - **Password:** `admin123`
          ⚠️ Change password immediately after first login!
          ## 🔑 Get GitHub Token
          1. GitHub → Profile → Settings
          2. Developer Settings → Personal Access Tokens → Tokens (classic)
          3. Generate new token → Check `repo` → Copy token
          4. Enter in Admin Dashboard → Settings → GitHub Connection
          ## 🌐 URLs
          - **Student Portal:** `https://YOUR-USERNAME.github.io/sample-papers/`
          - **Admin Dashboard:** `https://YOUR-USERNAME.github.io/sample-papers/admin.html`
          EOF
      - name: 📄 Create index.html (Student Portal)
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title id="page-title">Study Portal</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
              <style>
                  :root {
                      --primary: #6366f1;
                      --secondary: #ec4899;
                      --bg: #f8fafc;
                      --bg-card: rgba(255,255,255,0.9);
                      --text: #1e293b;
                      --text-muted: #64748b;
                      --border: #e2e8f0;
                  }
                  [data-theme="dark"] {
                      --bg: #0f172a;
                      --bg-card: rgba(30,41,59,0.9);
                      --text: #f1f5f9;
                      --text-muted: #94a3b8;
                      --border: #334155;
                  }
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Inter', sans-serif;
                      background: var(--bg);
                      color: var(--text);
                      min-height: 100vh;
                      transition: all 0.3s;
                  }
                  .theme-toggle {
                      position: fixed;
                      top: 20px; right: 20px;
                      z-index: 1000;
                      background: var(--bg-card);
                      border: 1px solid var(--border);
                      width: 50px; height: 50px;
                      border-radius: 50%;
                      cursor: pointer;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      font-size: 1.5rem;
                      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                      transition: transform 0.3s;
                  }
                  .theme-toggle:hover { transform: scale(1.1); }
                  .hero {
                      background: linear-gradient(135deg, var(--primary), var(--secondary));
                      padding: 80px 20px 120px;
                      text-align: center;
                      position: relative;
                  }
                  .hero::after {
                      content: '';
                      position: absolute;
                      bottom: -2px; left: 0;
                      width: 100%; height: 60px;
                      background: var(--bg);
                      clip-path: ellipse(55% 100% at 50% 100%);
                  }
                  .hero h1 {
                      font-size: clamp(2rem, 5vw, 3rem);
                      color: white;
                      margin-bottom: 10px;
                  }
                  .hero p { color: rgba(255,255,255,0.9); font-size: 1.1rem; }
                  .hero-stats {
                      display: flex;
                      justify-content: center;
                      gap: 50px;
                      margin-top: 30px;
                  }
                  .stat-number { font-size: 2.5rem; font-weight: 800; color: white; }
                  .stat-label { color: rgba(255,255,255,0.8); font-size: 0.85rem; text-transform: uppercase; }
                  .container {
                      max-width: 1200px;
                      margin: -50px auto 40px;
                      padding: 0 20px;
                      position: relative;
                      z-index: 10;
                  }
                  .search-section {
                      background: var(--bg-card);
                      backdrop-filter: blur(10px);
                      border: 1px solid var(--border);
                      padding: 25px;
                      border-radius: 20px;
                      margin-bottom: 30px;
                      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
                  }
                  .search-bar {
                      width: 100%;
                      padding: 15px 20px;
                      border: 2px solid var(--border);
                      border-radius: 12px;
                      font-size: 1rem;
                      background: var(--bg);
                      color: var(--text);
                      outline: none;
                      transition: border-color 0.3s;
                  }
                  .search-bar:focus { border-color: var(--primary); }
                  .filter-tags {
                      display: flex;
                      flex-wrap: wrap;
                      gap: 10px;
                      margin-top: 15px;
                  }
                  .filter-tag {
                      padding: 8px 16px;
                      background: var(--bg);
                      border: 2px solid var(--border);
                      border-radius: 25px;
                      cursor: pointer;
                      font-size: 0.9rem;
                      font-weight: 500;
                      transition: all 0.3s;
                  }
                  .filter-tag:hover { border-color: var(--primary); color: var(--primary); }
                  .filter-tag.active {
                      background: linear-gradient(135deg, var(--primary), var(--secondary));
                      color: white;
                      border-color: transparent;
                  }
                  .grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                      gap: 25px;
                  }
                  .card {
                      background: var(--bg-card);
                      border: 1px solid var(--border);
                      border-radius: 20px;
                      padding: 25px;
                      transition: all 0.3s;
                      display: flex;
                      flex-direction: column;
                  }
                  .card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
                      border-color: var(--primary);
                  }
                  .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
                  .tag {
                      background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(236,72,153,0.1));
                      color: var(--primary);
                      padding: 6px 14px;
                      border-radius: 20px;
                      font-size: 0.75rem;
                      font-weight: 700;
                      text-transform: uppercase;
                  }
                  .new-badge {
                      background: linear-gradient(135deg, #10b981, #059669);
                      color: white;
                      padding: 5px 10px;
                      border-radius: 15px;
                      font-size: 0.7rem;
                      font-weight: 700;
                  }
                  .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
                  .description { color: var(--text-muted); font-size: 0.9rem; flex-grow: 1; margin-bottom: 15px; }
                  .meta { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 15px; }
                  .download-btn {
                      background: linear-gradient(135deg, var(--primary), var(--secondary));
                      color: white;
                      padding: 14px;
                      border-radius: 12px;
                      text-decoration: none;
                      text-align: center;
                      font-weight: 700;
                      transition: all 0.3s;
                  }
                  .download-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(99,102,241,0.4); }
                  .empty-state { text-align: center; padding: 60px; grid-column: 1/-1; }
                  .empty-state-icon { font-size: 4rem; margin-bottom: 15px; }
                  .footer {
                      text-align: center;
                      padding: 40px;
                      color: var(--text-muted);
                      border-top: 1px solid var(--border);
                      margin-top: 60px;
                  }
                  .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
                  .footer a:hover { color: var(--secondary); }
                  .loading { text-align: center; padding: 60px; grid-column: 1/-1; }
                  .spinner {
                      width: 40px; height: 40px;
                      border: 4px solid var(--border);
                      border-top-color: var(--primary);
                      border-radius: 50%;
                      animation: spin 1s linear infinite;
                      margin: 0 auto 15px;
                  }
                  @keyframes spin { to { transform: rotate(360deg); } }
                  @media (max-width: 768px) {
                      .hero-stats { gap: 30px; }
                      .stat-number { font-size: 2rem; }
                      .grid { grid-template-columns: 1fr; }
                  }
              </style>
          </head>
          <body>
              <button class="theme-toggle" onclick="toggleTheme()">
                  <span id="theme-icon">🌙</span>
              </button>
              
              <div class="hero">
                  <h1 id="site-name">📚 Study Portal</h1>
                  <p id="site-tagline">Your gateway to academic excellence!</p>
                  <div class="hero-stats">
                      <div>
                          <div class="stat-number" id="total-papers">0</div>
                          <div class="stat-label">Papers</div>
                      </div>
                      <div>
                          <div class="stat-number" id="total-subjects">0</div>
                          <div class="stat-label">Subjects</div>
                      </div>
                  </div>
              </div>
              
              <div class="container">
                  <div class="search-section">
                      <input type="text" id="search" class="search-bar" placeholder="🔍 Search papers..." onkeyup="filterPapers()">
                      <div class="filter-tags" id="filter-tags">
                          <span class="filter-tag active" onclick="filterBySubject('all', this)">📚 All</span>
                      </div>
                  </div>
                  <div class="grid" id="paper-grid">
                      <div class="loading">
                          <div class="spinner"></div>
                          <p>Loading papers...</p>
                      </div>
                  </div>
              </div>
              
              <div class="footer">
                  <p id="footer-text">Made with ❤️ for Students</p>
                  <p style="margin-top: 15px;"><a href="admin.html">🔐 Admin Portal</a></p>
              </div>
              
              <script>
                  let allPapers = [];
                  let siteConfig = {};
                  let currentFilter = 'all';
                  
                  function initTheme() {
                      const saved = localStorage.getItem('theme') || 'light';
                      document.documentElement.setAttribute('data-theme', saved);
                      document.getElementById('theme-icon').textContent = saved === 'dark' ? '☀️' : '🌙';
                  }
                  
                  function toggleTheme() {
                      const current = document.documentElement.getAttribute('data-theme');
                      const next = current === 'dark' ? 'light' : 'dark';
                      document.documentElement.setAttribute('data-theme', next);
                      localStorage.setItem('theme', next);
                      document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
                  }
                  
                  async function loadConfig() {
                      try {
                          const res = await fetch('config.json?t=' + Date.now());
                          siteConfig = await res.json();
                          if (siteConfig.siteName) document.getElementById('site-name').textContent = '📚 ' + siteConfig.siteName;
                          if (siteConfig.siteTagline) document.getElementById('site-tagline').textContent = siteConfig.siteTagline;
                          if (siteConfig.footerText) document.getElementById('footer-text').textContent = siteConfig.footerText;
                          if (siteConfig.primaryColor) document.documentElement.style.setProperty('--primary', siteConfig.primaryColor);
                          if (siteConfig.secondaryColor) document.documentElement.style.setProperty('--secondary', siteConfig.secondaryColor);
                      } catch (e) { console.log('Using defaults'); }
                  }
                  
                  async function loadPapers() {
                      try {
                          const res = await fetch('papers.json?t=' + Date.now());
                          allPapers = await res.json();
                          updateStats();
                          buildFilterTags();
                          renderPapers(allPapers);
                      } catch (e) {
                          document.getElementById('paper-grid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><h3>Coming Soon!</h3><p>Papers are being uploaded.</p></div>';
                      }
                  }
                  
                  function updateStats() {
                      const visible = allPapers.filter(p => p.visible !== false);
                      document.getElementById('total-papers').textContent = visible.length;
                      document.getElementById('total-subjects').textContent = [...new Set(visible.map(p => p.subject))].length;
                  }
                  
                  function buildFilterTags() {
                      const subjects = [...new Set(allPapers.filter(p => p.visible !== false).map(p => p.subject))].sort();
                      const container = document.getElementById('filter-tags');
                      container.innerHTML = '<span class="filter-tag active" onclick="filterBySubject(\'all\', this)">📚 All</span>';
                      subjects.forEach(s => {
                          container.innerHTML += '<span class="filter-tag" onclick="filterBySubject(\'' + s + '\', this)">' + s + '</span>';
                      });
                  }
                  
                  function filterBySubject(subject, el) {
                      currentFilter = subject;
                      document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                      el.classList.add('active');
                      filterPapers();
                  }
                  
                  function filterPapers() {
                      const query = document.getElementById('search').value.toLowerCase();
                      let filtered = allPapers.filter(p => p.visible !== false);
                      if (currentFilter !== 'all') filtered = filtered.filter(p => p.subject === currentFilter);
                      if (query) filtered = filtered.filter(p => p.name.toLowerCase().includes(query) || (p.subject && p.subject.toLowerCase().includes(query)));
                      renderPapers(filtered);
                  }
                  
                  function renderPapers(papers) {
                      const grid = document.getElementById('paper-grid');
                      if (papers.length === 0) {
                          grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>No Papers Found</h3></div>';
                          return;
                      }
                      grid.innerHTML = papers.map(p => {
                          const date = new Date(p.id).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                          const isNew = Date.now() - p.id < 3 * 24 * 60 * 60 * 1000;
                          return '<div class="card"><div class="card-header"><span class="tag">' + (p.subject || 'General') + '</span>' + (isNew ? '<span class="new-badge">✨ NEW</span>' : '') + '</div><div class="title">' + p.name + '</div><div class="description">' + (p.description || 'Download this paper for your preparation!') + '</div><div class="meta">📅 ' + date + '</div><a href="' + p.link + '" class="download-btn" download>📥 Download</a></div>';
                      }).join('');
                  }
                  
                  initTheme();
                  loadConfig();
                  loadPapers();
              </script>
          </body>
          </html>
          HTMLEOF
      - name: 📄 Create admin.html (Admin Dashboard)
        run: |
          cat > admin.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Admin Dashboard</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
              <style>
                  :root {
                      --bg: #0f172a;
                      --card: #1e293b;
                      --border: #334155;
                      --text: #f1f5f9;
                      --muted: #94a3b8;
                      --primary: #6366f1;
                      --success: #10b981;
                      --warning: #f59e0b;
                      --danger: #ef4444;
                  }
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
                  
                  /* Login */
                  .login-container {
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  .login-box {
                      background: var(--card);
                      border: 1px solid var(--border);
                      border-radius: 20px;
                      padding: 40px;
                      width: 100%;
                      max-width: 400px;
                      text-align: center;
                  }
                  .login-box h1 { font-size: 1.8rem; margin-bottom: 10px; color: var(--primary); }
                  .login-box > p { color: var(--muted); margin-bottom: 25px; }
                  
                  /* Forms */
                  .form-group { margin-bottom: 15px; text-align: left; }
                  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
                  input, textarea, select {
                      width: 100%;
                      padding: 12px 15px;
                      border: 2px solid var(--border);
                      border-radius: 10px;
                      background: var(--bg);
                      color: var(--text);
                      font-family: inherit;
                      font-size: 1rem;
                      outline: none;
                      transition: border-color 0.3s;
                  }
                  input:focus, textarea:focus { border-color: var(--primary); }
                  button {
                      width: 100%;
                      padding: 14px;
                      border: none;
                      border-radius: 10px;
                      background: var(--primary);
                      color: white;
                      font-family: inherit;
                      font-size: 1rem;
                      font-weight: 700;
                      cursor: pointer;
                      transition: opacity 0.3s;
                  }
                  button:hover { opacity: 0.9; }
                  button:disabled { opacity: 0.5; cursor: not-allowed; }
                  .back-link { display: block; margin-top: 20px; color: var(--muted); text-decoration: none; }
                  .back-link:hover { color: var(--primary); }
                  
                  /* Dashboard */
                  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
                  .header {
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                      padding: 20px;
                      background: var(--card);
                      border: 1px solid var(--border);
                      border-radius: 15px;
                      margin-bottom: 20px;
                  }
                  .header h1 { font-size: 1.4rem; }
                  .header-btns { display: flex; gap: 10px; }
                  .btn { padding: 10px 18px; border-radius: 8px; font-size: 0.9rem; width: auto; }
                  .btn-outline { background: transparent; border: 2px solid var(--border); }
                  .btn-danger { background: var(--danger); }
                  .btn-success { background: var(--success); }
                  .btn-warning { background: var(--warning); color: #000; }
                  
                  /* Tabs */
                  .tabs {
                      display: flex;
                      gap: 8px;
                      margin-bottom: 20px;
                      background: var(--card);
                      padding: 8px;
                      border-radius: 12px;
                      border: 1px solid var(--border);
                  }
                  .tab {
                      flex: 1;
                      padding: 12px;
                      background: transparent;
                      border: none;
                      color: var(--muted);
                      font-weight: 600;
                      cursor: pointer;
                      border-radius: 8px;
                      transition: all 0.3s;
                  }
                  .tab:hover { color: var(--text); }
                  .tab.active { background: var(--primary); color: white; }
                  .tab-content { display: none; }
                  .tab-content.active { display: block; }
                  
                  /* Stats */
                  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
                  .stat-card {
                      background: var(--card);
                      border: 1px solid var(--border);
                      border-radius: 12px;
                      padding: 20px;
                      text-align: center;
                  }
                  .stat-card .num { font-size: 2rem; font-weight: 800; color: var(--primary); }
                  .stat-card .lbl { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
                  
                  /* Card */
                  .card {
                      background: var(--card);
                      border: 1px solid var(--border);
                      border-radius: 15px;
                      padding: 25px;
                      margin-bottom: 20px;
                  }
                  .card h2 { font-size: 1.2rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
                  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
                  
                  /* Table */
                  .table-wrap { overflow-x: auto; }
                  table { width: 100%; border-collapse: collapse; }
                  th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
                  th { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
                  .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: 700; }
                  .badge-live { background: rgba(16,185,129,0.2); color: var(--success); }
                  .badge-hidden { background: rgba(239,68,68,0.2); color: var(--danger); }
                  .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
                  .action-btn { padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; width: auto; }
                  
                  /* Settings */
                  .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
                  .settings-box {
                      background: var(--bg);
                      border: 1px solid var(--border);
                      border-radius: 12px;
                      padding: 20px;
                  }
                  .settings-box h3 { color: var(--primary); font-size: 1rem; margin-bottom: 15px; }
                  
                  /* Alert */
                  .alert {
                      padding: 12px 15px;
                      border-radius: 8px;
                      margin-bottom: 15px;
                      font-size: 0.9rem;
                  }
                  .alert-warning { background: rgba(245,158,11,0.15); border: 1px solid var(--warning); color: var(--warning); }
                  
                  /* Modal */
                  .modal {
                      display: none;
                      position: fixed;
                      top: 0; left: 0;
                      width: 100%; height: 100%;
                      background: rgba(0,0,0,0.8);
                      align-items: center;
                      justify-content: center;
                      z-index: 1000;
                      padding: 20px;
                  }
                  .modal.show { display: flex; }
                  .modal-box {
                      background: var(--card);
                      border: 1px solid var(--border);
                      border-radius: 15px;
                      padding: 30px;
                      width: 100%;
                      max-width: 450px;
                  }
                  .modal-box h2 { margin-bottom: 20px; }
                  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
                  .modal-btns button { flex: 1; }
                  
                  /* Status */
                  .status-bar {
                      position: fixed;
                      bottom: 20px;
                      left: 50%;
                      transform: translateX(-50%) translateY(100px);
                      background: var(--success);
                      color: white;
                      padding: 15px 30px;
                      border-radius: 30px;
                      font-weight: 700;
                      z-index: 1000;
                      transition: transform 0.5s;
                  }
                  .status-bar.show { transform: translateX(-50%) translateY(0); }
                  
                  @media (max-width: 768px) {
                      .header { flex-direction: column; gap: 15px; }
                      .header-btns { width: 100%; justify-content: center; }
                      .tabs { flex-wrap: wrap; }
                      .tab { flex: 1 1 45%; }
                  }
              </style>
          </head>
          <body>
              <!-- LOGIN -->
              <div id="login-screen" class="login-container">
                  <div class="login-box">
                      <h1>🔐 Admin Login</h1>
                      <p>Enter your credentials</p>
                      <div class="form-group">
                          <label>Username</label>
                          <input type="text" id="login-user" placeholder="Enter username">
                      </div>
                      <div class="form-group">
                          <label>Password</label>
                          <input type="password" id="login-pass" placeholder="Enter password">
                      </div>
                      <button onclick="login()">🚀 Login</button>
                      <a href="index.html" class="back-link">← Back to Portal</a>
                  </div>
              </div>
              <!-- DASHBOARD -->
              <div id="dashboard" style="display:none;">
                  <div class="container">
                      <div class="header">
                          <h1>👨‍🏫 <span id="welcome-text">Admin Dashboard</span></h1>
                          <div class="header-btns">
                              <button class="btn btn-outline" onclick="window.open('index.html','_blank')">👁️ View Site</button>
                              <button class="btn btn-danger" onclick="logout()">🚪 Logout</button>
                          </div>
                      </div>
                      <div class="tabs">
                          <button class="tab active" onclick="switchTab('papers',this)">📄 Papers</button>
                          <button class="tab" onclick="switchTab('upload',this)">📤 Upload</button>
                          <button class="tab" onclick="switchTab('settings',this)">⚙️ Settings</button>
                      </div>
                      <!-- PAPERS TAB -->
                      <div id="tab-papers" class="tab-content active">
                          <div class="stats">
                              <div class="stat-card"><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
                              <div class="stat-card"><div class="num" id="s-live">0</div><div class="lbl">Live</div></div>
                              <div class="stat-card"><div class="num" id="s-hidden">0</div><div class="lbl">Hidden</div></div>
                              <div class="stat-card"><div class="num" id="s-subjects">0</div><div class="lbl">Subjects</div></div>
                          </div>
                          <div class="card">
                              <h2>🛠️ Manage Papers</h2>
                              <div class="table-wrap">
                                  <table>
                                      <thead><tr><th>Status</th><th>Subject</th><th>Name</th><th>Date</th><th>Actions</th></tr></thead>
                                      <tbody id="paper-list"><tr><td colspan="5" style="text-align:center;padding:40px;">Loading...</td></tr></tbody>
                                  </table>
                              </div>
                          </div>
                      </div>
                      <!-- UPLOAD TAB -->
                      <div id="tab-upload" class="tab-content">
                          <div class="card">
                              <h2>📤 Upload New Paper</h2>
                              <div class="alert alert-warning" id="token-alert">⚠️ Add GitHub Token in Settings first!</div>
                              <div class="grid-2">
                                  <div class="form-group"><label>Paper Name *</label><input type="text" id="up-name" placeholder="e.g. Physics 2024"></div>
                                  <div class="form-group"><label>Subject *</label><input type="text" id="up-subject" placeholder="e.g. Physics"></div>
                                  <div class="form-group"><label>PDF File *</label><input type="file" id="up-file" accept=".pdf"></div>
                              </div>
                              <div class="form-group"><label>Description</label><textarea id="up-desc" rows="2" placeholder="Optional description..."></textarea></div>
                              <button id="up-btn" onclick="uploadPaper()">🚀 Publish</button>
                          </div>
                      </div>
                      <!-- SETTINGS TAB -->
                      <div id="tab-settings" class="tab-content">
                          <div class="settings-grid">
                              <div class="settings-box">
                                  <h3>🔑 GitHub Connection</h3>
                                  <div class="form-group"><label>GitHub Username</label><input type="text" id="cfg-ghuser" placeholder="rajaprogrammer"></div>
                                  <div class="form-group"><label>Repo Name</label><input type="text" id="cfg-repo" placeholder="sample-papers"></div>
                                  <div class="form-group"><label>GitHub Token</label><input type="password" id="cfg-token" placeholder="ghp_xxxxx..."></div>
                                  <button onclick="saveGitHub()">💾 Save</button>
                              </div>
                              <div class="settings-box">
                                  <h3>🔐 Admin Credentials</h3>
                                  <div class="form-group"><label>Username</label><input type="text" id="cfg-user" placeholder="New username"></div>
                                  <div class="form-group"><label>New Password</label><input type="password" id="cfg-pass" placeholder="New password"></div>
                                  <div class="form-group"><label>Confirm Password</label><input type="password" id="cfg-pass2" placeholder="Confirm password"></div>
                                  <button class="btn-warning" onclick="saveCredentials()">🔒 Update</button>
                              </div>
                              <div class="settings-box">
                                  <h3>🎨 Site Settings</h3>
                                  <div class="form-group"><label>Site Name</label><input type="text" id="cfg-name" placeholder="Riyaaz Sir's Portal"></div>
                                  <div class="form-group"><label>Tagline</label><input type="text" id="cfg-tagline" placeholder="Your gateway to excellence!"></div>
                                  <div class="form-group"><label>Footer Text</label><input type="text" id="cfg-footer" placeholder="Made with ❤️"></div>
                                  <button class="btn-success" onclick="saveSite()">✨ Update</button>
                              </div>
                              <div class="settings-box">
                                  <h3>🌈 Theme Colors</h3>
                                  <div class="form-group"><label>Primary Color</label><input type="color" id="cfg-primary" value="#6366f1"></div>
                                  <div class="form-group"><label>Secondary Color</label><input type="color" id="cfg-secondary" value="#ec4899"></div>
                                  <button onclick="saveColors()">🎨 Update</button>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
              <!-- EDIT MODAL -->
              <div class="modal" id="edit-modal">
                  <div class="modal-box">
                      <h2>✏️ Edit Paper</h2>
                      <input type="hidden" id="edit-id">
                      <div class="form-group"><label>Name</label><input type="text" id="edit-name"></div>
                      <div class="form-group"><label>Subject</label><input type="text" id="edit-subject"></div>
                      <div class="form-group"><label>Description</label><textarea id="edit-desc" rows="2"></textarea></div>
                      <div class="modal-btns">
                          <button class="btn-outline" onclick="closeModal('edit-modal')">Cancel</button>
                          <button onclick="saveEdit()">💾 Save</button>
                      </div>
                  </div>
              </div>
              <!-- REPLACE MODAL -->
              <div class="modal" id="replace-modal">
                  <div class="modal-box">
                      <h2>🔄 Replace PDF</h2>
                      <input type="hidden" id="replace-id">
                      <div class="form-group"><label>New PDF</label><input type="file" id="replace-file" accept=".pdf"></div>
                      <div class="modal-btns">
                          <button class="btn-outline" onclick="closeModal('replace-modal')">Cancel</button>
                          <button id="replace-btn" onclick="doReplace()">📤 Upload</button>
                      </div>
                  </div>
              </div>
              <div class="status-bar" id="status-bar"></div>
              <script>
                  let config = {};
                  let papers = [];
                  let dbSha = '';
                  let cfgSha = '';
                  let token = '';
                  const b64e = s => btoa(unescape(encodeURIComponent(s)));
                  const b64d = s => decodeURIComponent(escape(atob(s)));
                  async function init() {
                      try {
                          const r = await fetch('config.json?t=' + Date.now());
                          config = await r.json();
                      } catch (e) {
                          config = { adminUsername: 'riyaazsir', adminPassword: 'admin123', githubUsername: 'rajaprogrammer', repoName: 'sample-papers', siteName: "Riyaaz Sir's Portal", siteTagline: 'Your gateway!', footerText: 'Made with ❤️', primaryColor: '#6366f1', secondaryColor: '#ec4899' };
                      }
                      if (localStorage.getItem('admin_session') === 'active') {
                          token = localStorage.getItem('gh_token') || '';
                          showDashboard();
                      }
                  }
                  function login() {
                      const u = document.getElementById('login-user').value.trim();
                      const p = document.getElementById('login-pass').value;
                      if (u === config.adminUsername && p === config.adminPassword) {
                          localStorage.setItem('admin_session', 'active');
                          token = localStorage.getItem('gh_token') || '';
                          showDashboard();
                      } else {
                          alert('❌ Invalid credentials!');
                      }
                  }
                  function logout() {
                      localStorage.removeItem('admin_session');
                      location.reload();
                  }
                  async function showDashboard() {
                      document.getElementById('login-screen').style.display = 'none';
                      document.getElementById('dashboard').style.display = 'block';
                      document.getElementById('welcome-text').textContent = 'Welcome, ' + config.adminUsername + '!';
                      loadSettingsForm();
                      checkToken();
                      await loadPapers();
                  }
                  function loadSettingsForm() {
                      document.getElementById('cfg-ghuser').value = config.githubUsername || '';
                      document.getElementById('cfg-repo').value = config.repoName || '';
                      document.getElementById('cfg-token').value = token;
                      document.getElementById('cfg-user').value = config.adminUsername || '';
                      document.getElementById('cfg-name').value = config.siteName || '';
                      document.getElementById('cfg-tagline').value = config.siteTagline || '';
                      document.getElementById('cfg-footer').value = config.footerText || '';
                      document.getElementById('cfg-primary').value = config.primaryColor || '#6366f1';
                      document.getElementById('cfg-secondary').value = config.secondaryColor || '#ec4899';
                  }
                  function checkToken() {
                      document.getElementById('token-alert').style.display = token ? 'none' : 'block';
                  }
                  function switchTab(name, btn) {
                      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                      btn.classList.add('active');
                      document.getElementById('tab-' + name).classList.add('active');
                  }
                  function showStatus(msg) {
                      const bar = document.getElementById('status-bar');
                      bar.textContent = msg;
                      bar.classList.add('show');
                      setTimeout(() => bar.classList.remove('show'), 3500);
                  }
                  function repo() { return config.githubUsername + '/' + config.repoName; }
                  async function loadPapers() {
                      if (!token) { renderPapers(); return; }
                      try {
                          const r = await fetch('https://api.github.com/repos/' + repo() + '/contents/papers.json', { headers: { Authorization: 'token ' + token } });
                          if (r.ok) {
                              const d = await r.json();
                              dbSha = d.sha;
                              papers = JSON.parse(b64d(d.content));
                          }
                      } catch (e) { papers = []; }
                      updateStats();
                      renderPapers();
                  }
                  async function savePapers() {
                      if (!token) { alert('Add GitHub Token first!'); return false; }
                      const r = await fetch('https://api.github.com/repos/' + repo() + '/contents/papers.json', {
                          method: 'PUT',
                          headers: { Authorization: 'token ' + token },
                          body: JSON.stringify({ message: 'Update papers', content: b64e(JSON.stringify(papers)), sha: dbSha || undefined })
                      });
                      if (r.ok) {
                          const d = await r.json();
                          dbSha = d.content.sha;
                          showStatus('✅ Saved! Updates in ~60s');
                          updateStats();
                          renderPapers();
                          return true;
                      }
                      return false;
                  }
                  async function saveConfig() {
                      if (!token) { alert('Add GitHub Token first!'); return false; }
                      try {
                          const r = await fetch('https://api.github.com/repos/' + repo() + '/contents/config.json', { headers: { Authorization: 'token ' + token } });
                          if (r.ok) { const d = await r.json(); cfgSha = d.sha; }
                      } catch (e) {}
                      const r = await fetch('https://api.github.com/repos/' + repo() + '/contents/config.json', {
                          method: 'PUT',
                          headers: { Authorization: 'token ' + token },
                          body: JSON.stringify({ message: 'Update config', content: b64e(JSON.stringify(config)), sha: cfgSha || undefined })
                      });
                      if (r.ok) {
                          const d = await r.json();
                          cfgSha = d.content.sha;
                          showStatus('✅ Settings saved!');
                          return true;
                      }
                      return false;
                  }
                  async function uploadFile(file, name) {
                      return new Promise((res, rej) => {
                          const reader = new FileReader();
                          reader.onload = async e => {
                              const b64 = e.target.result.split(',')[1];
                              const r = await fetch('https://api.github.com/repos/' + repo() + '/contents/papers/' + name, {
                                  method: 'PUT',
                                  headers: { Authorization: 'token ' + token },
                                  body: JSON.stringify({ message: 'Upload ' + name, content: b64 })
                              });
                              r.ok ? res('papers/' + name) : rej('Upload failed');
                          };
                          reader.readAsDataURL(file);
                      });
                  }
                  function updateStats() {
                      const live = papers.filter(p => p.visible !== false).length;
                      document.getElementById('s-total').textContent = papers.length;
                      document.getElementById('s-live').textContent = live;
                      document.getElementById('s-hidden').textContent = papers.length - live;
                      document.getElementById('s-subjects').textContent = [...new Set(papers.map(p => p.subject))].length;
                  }
                  function renderPapers() {
                      const list = document.getElementById('paper-list');
                      if (!papers.length) {
                          list.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);">No papers yet. Upload one!</td></tr>';
                          return;
                      }
                      list.innerHTML = papers.map(p => {
                          const live = p.visible !== false;
                          const date = new Date(p.id).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                          return '<tr style="opacity:' + (live ? 1 : 0.5) + '"><td><span class="badge ' + (live ? 'badge-live">🟢 Live' : 'badge-hidden">🔴 Hidden') + '</span></td><td>' + p.subject + '</td><td>' + p.name + '</td><td>' + date + '</td><td><div class="action-btns"><button class="action-btn btn-outline" onclick="openEdit(' + p.id + ')">✏️</button><button class="action-btn btn-success" onclick="openReplace(' + p.id + ')">🔄</button><button class="action-btn btn-warning" onclick="toggleVis(' + p.id + ')">' + (live ? '🙈' : '👁️') + '</button><button class="action-btn btn-danger" onclick="deletePaper(' + p.id + ')">🗑️</button></div></td></tr>';
                      }).join('');
                  }
                  async function uploadPaper() {
                      const name = document.getElementById('up-name').value.trim();
                      const subj = document.getElementById('up-subject').value.trim();
                      const desc = document.getElementById('up-desc').value.trim();
                      const file = document.getElementById('up-file').files[0];
                      if (!name || !subj || !file) return alert('Fill all required fields!');
                      if (!token) return alert('Add GitHub Token first!');
                      const btn = document.getElementById('up-btn');
                      btn.disabled = true; btn.textContent = '⏳ Uploading...';
                      try {
                          const link = await uploadFile(file, Date.now() + '.pdf');
                          papers.unshift({ id: Date.now(), name, subject: subj, description: desc, link, visible: true });
                          await savePapers();
                          document.getElementById('up-name').value = '';
                          document.getElementById('up-subject').value = '';
                          document.getElementById('up-desc').value = '';
                          document.getElementById('up-file').value = '';
                      } catch (e) { alert(e); }
                      btn.disabled = false; btn.textContent = '🚀 Publish';
                  }
                  async function toggleVis(id) {
                      const p = papers.find(x => x.id === id);
                      if (p) { p.visible = p.visible === false ? true : false; await savePapers(); }
                  }
                  async function deletePaper(id) {
                      if (!confirm('Delete this paper?')) return;
                      papers = papers.filter(p => p.id !== id);
                      await savePapers();
                  }
                  function openEdit(id) {
                      const p = papers.find(x => x.id === id);
                      if (!p) return;
                      document.getElementById('edit-id').value = id;
                      document.getElementById('edit-name').value = p.name;
                      document.getElementById('edit-subject').value = p.subject;
                      document.getElementById('edit-desc').value = p.description || '';
                      document.getElementById('edit-modal').classList.add('show');
                  }
                  async function saveEdit() {
                      const id = parseInt(document.getElementById('edit-id').value);
                      const p = papers.find(x => x.id === id);
                      if (p) {
                          p.name = document.getElementById('edit-name').value.trim();
                          p.subject = document.getElementById('edit-subject').value.trim();
                          p.description = document.getElementById('edit-desc').value.trim();
                          await savePapers();
                      }
                      closeModal('edit-modal');
                  }
                  function openReplace(id) {
                      document.getElementById('replace-id').value = id;
                      document.getElementById('replace-file').value = '';
                      document.getElementById('replace-modal').classList.add('show');
                  }
                  async function doReplace() {
                      const id = parseInt(document.getElementById('replace-id').value);
                      const file = document.getElementById('replace-file').files[0];
                      if (!file) return alert('Select a file!');
                      const btn = document.getElementById('replace-btn');
                      btn.disabled = true; btn.textContent = '⏳...';
                      try {
                          const link = await uploadFile(file, 'r' + Date.now() + '.pdf');
                          const p = papers.find(x => x.id === id);
                          if (p) { p.link = link; await savePapers(); }
                          closeModal('replace-modal');
                      } catch (e) { alert(e); }
                      btn.disabled = false; btn.textContent = '📤 Upload';
                  }
                  function closeModal(id) { document.getElementById(id).classList.remove('show'); }
                  document.querySelectorAll('.modal').forEach(m => {
                      m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
                  });
                  function saveGitHub() {
                      config.githubUsername = document.getElementById('cfg-ghuser').value.trim();
                      config.repoName = document.getElementById('cfg-repo').value.trim();
                      const t = document.getElementById('cfg-token').value.trim();
                      if (t) { localStorage.setItem('gh_token', t); token = t; }
                      saveConfig();
                      checkToken();
                  }
                  async function saveCredentials() {
                      const u = document.getElementById('cfg-user').value.trim();
                      const p = document.getElementById('cfg-pass').value;
                      const p2 = document.getElementById('cfg-pass2').value;
                      if (!u) return alert('Enter username!');
                      if (p && p !== p2) return alert('Passwords do not match!');
                      config.adminUsername = u;
                      if (p) config.adminPassword = p;
                      await saveConfig();
                      document.getElementById('welcome-text').textContent = 'Welcome, ' + u + '!';
                      document.getElementById('cfg-pass').value = '';
                      document.getElementById('cfg-pass2').value = '';
                  }
                  async function saveSite() {
                      config.siteName = document.getElementById('cfg-name').value.trim() || config.siteName;
                      config.siteTagline = document.getElementById('cfg-tagline').value.trim() || config.siteTagline;
                      config.footerText = document.getElementById('cfg-footer').value.trim() || config.footerText;
                      await saveConfig();
                  }
                  async function saveColors() {
                      config.primaryColor = document.getElementById('cfg-primary').value;
                      config.secondaryColor = document.getElementById('cfg-secondary').value;
                      await saveConfig();
                  }
                  init();
              </script>
          </body>
          </html>
          HTMLEOF
      - name: ✅ Commit Everything
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "🔄 RESET: Fresh LMS Installation" || echo "Nothing to commit"
          git push --force
